services:
  mysql:
    image: mysql:8.4
    container_name: pizzagate-mysql
    environment:
      MYSQL_DATABASE: pizzagate
      MYSQL_USER: pizzauser
      MYSQL_PASSWORD: pizzapass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/Pizzagate
      dockerfile: Dockerfile
    container_name: pizzagate-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pizzagate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: pizzauser
      SPRING_DATASOURCE_PASSWORD: pizzapass
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend/Pizzagate
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: pizzagate-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
