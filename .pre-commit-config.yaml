repos:
  - repo: https://github.com/semgrep/pre-commit
    rev: 'v1.150.0'
    hooks:
      - id: semgrep
        name: Semgrep SAST (default rules)
        args: ['--config', 'p/default', '--error', '--skip-unknown-extensions']
      - id: semgrep
        name: Semgrep SAST (secrets)
        args: ['--config', 'p/secrets', '--error', '--skip-unknown-extensions']

  - repo: local
    hooks:
      - id: eslint-security
        name: ESLint Security (frontend)
        language: system
        entry: bash -c 'cd frontend/Pizzagate && npm run lint -- --max-warnings 0'
        pass_filenames: false
        files: \.(ts|tsx|js|jsx)$